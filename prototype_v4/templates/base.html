<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NeoNomad{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <header class="top-bar">
        <div class="logo">NEONOMAD</div>
        <div class="tagline">Multimodal Green Corridor Planner</div>
        <div class="status-dot {% if gee_available %}gee-on{% else %}gee-off{% endif %}">
            GEE {{ "LIVE" if gee_available else "OFFLINE" }}
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
